<!DOCTYPE html>
<html>
<head>
    <title>Order Confirmation</title>
<style>

/* ===== BODY ===== */
body {
    font-family: 'Poppins', Arial, sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #f5f7fa);
    padding: 20px;
    margin: 0;
}

/* ===== MAIN CONTAINER ===== */
.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1),
                0 0 15px rgba(30,144,255,0.2);
}

/* ===== TITLE ===== */
h1 {
    text-align: center;
    color: #1e90ff;
    text-shadow: 0 0 8px #1e90ff;
}

/* ===== SUBTEXT ===== */
p {
    text-align: center;
}

/* ===== SECTIONS ===== */
.section {
    margin-top: 30px;
}

.section h2 {
    border-bottom: 2px solid #e3f2fd;
    padding-bottom: 5px;
    color: #1e90ff;
}

/* ===== CUSTOMER INFO ===== */
.info p {
    margin: 6px 0;
    text-align: left;
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

table, th, td {
    border: 1px solid #e0e0e0;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #f0f8ff;
    color: #1e90ff;
}

/* ===== TOTAL ===== */
.total {
    text-align: right;
    font-size: 18px;
    margin-top: 10px;
    font-weight: bold;
    color: #1e90ff;
}

/* ===== BUTTON ===== */
.btn {
    display: block;
    margin: 30px auto 0;
    padding: 12px 25px;
    background: #1e90ff;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    border-radius: 8px;
    box-shadow: 0 0 10px #1e90ff, 0 0 20px #1e90ff;
    transition: 0.3s;
}

.btn:hover {
    background: #187bcd;
    box-shadow: 0 0 15px #1e90ff, 0 0 30px #1e90ff;
}


.animal {
    position: fixed;
    opacity: 0.15;
    pointer-events: none;

    z-index: 0;
    will-change: transform;
}

/* Keep UI above */
header, .container {
    position: relative;
    z-index: 2;
}

</style>
</head>
<body>

<div class="container">
    <h1>ORDER CONFIRMATION</h1>
    <p style="text-align:center;">Thank You for your order!</p>
    <p style="text-align:center;">Order No: <span id="orderNumber"></span></p>

    <!-- Customer Info -->
    <div class="section">
        <h2>Customer Info</h2>
        <div class="info">
            <p><strong>Name:</strong> <span id="custName"></span></p>
            <p><strong>Email:</strong> <span id="custEmail"></span></p>
            <p><strong>Phone:</strong> <span id="custPhone"></span></p>
            <p><strong>Address:</strong> <span id="custAddress"></span></p>
            <p><strong>City:</strong> <span id="custCity"></span></p>
        </div>
    </div>

    <!-- Order Summary -->
    <div class="section">
        <h2>Order Summary</h2>
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="orderTable">
            </tbody>
        </table>

        <div class="total">
            Total Amount: ₹ <span id="totalAmount"></span>
        </div>
    </div>
    <button class="btn" onclick="downloadBill()">DOWNLOAD BILL</button>
    <button class="btn" onclick="continueShopping()">CONTINUE SHOPPING</button>
</div>

<script>

    window.onload = function() {

    // 1. Order ID
    let orderId = localStorage.getItem("lastOrderId");
    document.getElementById("orderNumber").innerText = "SF-" + orderId;

    // 2. Get order data
    const orderData = JSON.parse(localStorage.getItem("orderData"));

    if (!orderData) {
        alert("No order found!");
        return;
    }

    const customer = orderData.customer;
    const cart = orderData.items;

    // 3. Fill customer info
    document.getElementById("custName").innerText = customer.name;
    document.getElementById("custEmail").innerText = customer.email;
    document.getElementById("custPhone").innerText = customer.phone;
    document.getElementById("custAddress").innerText = customer.address;
    document.getElementById("custCity").innerText = customer.city;

    // 4. Table + total
    let table = document.getElementById("orderTable");
    let grandTotal = 0;
    let rows = "";

    cart.forEach(item => {

        let price = parseFloat(String(item.price).replace(/[^0-9.]/g,'')) || 0;
        let qty = item.quantity || 1;
        let subtotal = price * qty;

        grandTotal += subtotal;

        rows += `
        <tr>
            <td>${item.name}</td>
            <td>${qty}</td>
            <td>₹${price}</td>
            <td>₹${subtotal}</td>
        </tr>
        `;
    });

    table.innerHTML = rows;

    document.getElementById("totalAmount").innerText = grandTotal;
};

function continueShopping() {
    const loggedUser = JSON.parse(localStorage.getItem("currentUser"));

    // 🧹 Clear cart after order
    if (loggedUser) {
        localStorage.removeItem("cart_" + loggedUser.email);
    }

    // 🔄 Redirect to products page
    window.location.href = "second.html"; // 👈 change if your page name is different
}
function downloadBill() {

    const orderData = JSON.parse(localStorage.getItem("orderData"));
    const orderId = localStorage.getItem("lastOrderId");

    if (!orderData) {
        alert("No order found!");
        return;
    }

    const customer = orderData.customer;
    const cart = orderData.items;

    fetch("http://localhost:3000/api/generate-bill", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            orderId,
            customer,
            cart
        })
    })
    .then(res => res.blob())
    .then(blob => {
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "StarFarms_Bill.xlsx";
        a.click();
    })
    .catch(err => {
        console.error(err);
        alert("Failed to download bill");
    });
}





</script>

<script>

/* ===== RANDOM ANIMAL GENERATOR ===== */

const animals = ["🐶","🐱","🐟","🐠","🕊️","🐾","🐕","🐈"];
function createAnimal() {
    let animal = document.createElement("div");
    animal.className = "animal";

    // Random emoji
    animal.innerText = animals[Math.floor(Math.random() * animals.length)];

    // Random vertical start
    let startY = Math.random() * window.innerHeight;
    animal.style.top = startY + "px";
    animal.style.left = "-50px";

    // Random size
    let size = Math.random() * 20 + 20;
    animal.style.fontSize = size + "px";

    document.body.appendChild(animal);

    // IMPORTANT: delay to trigger animation
    setTimeout(() => {

        let endX = window.innerWidth + 100;
        let moveY = (Math.random() * 200) - 100;
        let duration = Math.random() * 10 + 15;

        animal.style.transition = `transform ${duration}s linear`;
        animal.style.transform = `translate(${endX}px, ${moveY}px)`;

        // remove after animation
        setTimeout(() => {
            animal.remove();
        }, duration * 1000);

    }, 100); // 👈 THIS LINE FIXES EVERYTHING
}
setInterval(createAnimal, 500);
</script>
</body>
</html>
