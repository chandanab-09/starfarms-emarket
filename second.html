/* ---------------- SHOW PRODUCTS ---------------- */

/* --- REPLACED FUNCTION --- */
async function showProducts(category) {
    try {
        // 1. Get the Hardcoded Backup Data
        const hardcoded = productData[category] || [];

        // 2. Fetch from your MySQL Database
        const response = await fetch('http://localhost:3000/api/admin/get-all-products'); 
        const databaseProducts = await response.json();
        console.log("DB PRODUCTS:", databaseProducts);
        
        // 3. Filter Database items by category
      const filteredDB = databaseProducts.filter(p => 
    p.category &&
    p.category.toLowerCase().trim() === category.toLowerCase().trim()
);
    console.log("FILTERED:", filteredDB);
        

        // 4. COMBINE BOTH
        let combined = [...hardcoded, ...filteredDB];

        // 5. THE DE-DUPLICATOR 
        // This keeps only the first version of any product with a specific name
        allProducts = combined.filter((product, index, self) =>
            index === self.findIndex((p) => (
                p.name.toLowerCase().trim() === product.name.toLowerCase().trim()
            ))
        );

        displayProducts(allProducts);
        
    } catch (err) {
        console.error("Database error, showing VS Code backup:", err);
        allProducts = productData[category] || [];
        displayProducts(allProducts);
    }
}

function closeDetails() {
    const modal = document.getElementById("detailsModal");
    if (modal) {
        modal.style.display = "none";
    }
}


function displayProducts(products) {
    let area = document.getElementById("productArea");
    area.innerHTML = "";

    products.forEach(product => {
        let rawImg = product.image || product.img || 'placeholder.jpg';
        const imageSrc = (String(rawImg).startsWith('http')) ? rawImg : `images/${rawImg}`;

        const price = String(product.price).replace(/[^0-9.]/g, "");

        // ✅ SAFE DATA (fixes button click issue)
        const data = encodeURIComponent(JSON.stringify({
            id: product.id || Math.floor(Math.random()*100000),
            name: product.name || "Product",
            desc: product.description || product.desc || "No description",
            img: imageSrc,
            price: price,
            ingredients: product.ingredients || "Premium mix",
            benefits: product.benefits || "Healthy"
        }));

        area.innerHTML += `
        <div class="card">
            <img src="${imageSrc}" class="product-img" onerror="this.src='images/placeholder.jpg'">
            <h3>${product.name}</h3>
            <p>${(product.description || product.desc || "").substring(0, 45)}...</p>

            <button onclick="showDetails('${data}')">
                View Details
            </button>
        </div>`;
    });
}
/* ---------------- SEARCH ---------------- */

function searchProducts(){
    let value = document.getElementById("searchBox").value.toLowerCase();

    let filtered = allProducts.filter(p => {
        let name = (p.name || "").toLowerCase();
        let desc = (p.desc || p.description || "").toLowerCase();

        return name.includes(value) || desc.includes(value);
    });

    displayProducts(filtered);
}

    box.innerHTML = `
        <img src="${product.img}" style="width:100%; height:200px; object-fit:cover; border-radius:10px;">

/* ---------------- ADD TO CART ---------------- */

// Add to cart
// Add 'img' to the parameters here
function addToCart(id, name, price, img) {
    let loggedUser = JSON.parse(localStorage.getItem("currentUser"));
    if (!loggedUser) {
        alert("Please login first");
        return;
    }

    let userKey = "cart_" + loggedUser.email;
    let currentCart = JSON.parse(localStorage.getItem(userKey)) || [];

    let existing = currentCart.find(item => item.id === id);
    if (existing) {
        existing.quantity += 1;
    } else {
        currentCart.push({
            id: id,
            name: name,
            price: price,
            img: img, // Directly uses the image from the button
            quantity: 1
        });
    }

    localStorage.setItem(userKey, JSON.stringify(currentCart));
    cart = currentCart; 
    updateCartCount();
    alert(name + " added to cart!");
}

// Buy now
function buyNow(productName) {

    let product = Object.values(productData).flat().find(p => p.name === productName);
    if (!product) return;

    let directCart = [{
        id: product.id,
        name: product.name,
        price: product.price,
        img: product.img,
        quantity: 1
    }];

    localStorage.setItem(userKey, JSON.stringify(directCart));

    window.location.href = "checkout.html";
}

/* ---------------- CART FUNCTIONS ---------------- */

function saveCart(){
    localStorage.setItem(userKey, JSON.stringify(cart));
    updateCartCount();
}

function updateCartCount() {
    document.getElementById("cart-count").textContent =
        cart.reduce((sum, item) => sum + item.quantity, 0);
}

function toggleCart() {
    let popup = document.getElementById("cartPopup");

    if (popup.style.display === "flex") {
        popup.style.display = "none";
    } else {
        updateCartDisplay();
        popup.style.display = "flex";
    }
}

function updateCartDisplay() {

    let box = document.querySelector(".cart-box");

    if (cart.length === 0) {
        box.innerHTML = "<h3>Your Cart is Empty</h3><button onclick='toggleCart()'>Close</button>";
        return;
    }

    let total = 0;

    let html = `

        <div class="cart-header">
            <strong>Product</strong>
            <strong>Price</strong>
            <strong>Quantity</strong>
            <strong>Remove</strong>
        </div>
    `;

    cart.forEach(item => {
        // Ensure price is treated as a number
        let priceNum = parseFloat(String(item.price).replace(/[^0-9.]/g, '')) || 0;
        total += priceNum * item.quantity;

        html += `
            <div class="cart-row">
                <div class="cart-product">
                    <img src="${item.img}" alt="${item.name}">
                    <span>${item.name}</span>
                </div>
                <span>₹${priceNum.toFixed(2)}</span>
              

                // Replace the old <span>${item.quantity}</span> with this:
<div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
    <button onclick="changeQuantity(${item.id}, -1)" 
        style="width:28px; height:28px; cursor:pointer; border:1px solid #3b82f6; background:white; color:#3b82f6; border-radius:4px; font-weight:bold;">
        -
    </button>
    
    <span style="font-weight:bold; min-width:20px; text-align:center;">${item.quantity}</span>
    
    <button onclick="changeQuantity(${item.id}, 1)" 
        style="width:28px; height:28px; cursor:pointer; border:1px solid #3b82f6; background:white; color:#3b82f6; border-radius:4px; font-weight:bold;">
        +
    </button>
</div>
                <button type="button" onclick="removeFromCart(${item.id})" 
                    style="background:red; color:white; border:none; border-radius:3px; padding:5px 10px; cursor:pointer; font-weight:bold;">
                    X
                </button>
            </div>
        `;
    });

    html += `
        <div class="cart-total">
            <strong>Total: ₹${total}</strong>
        </div>

        <div class="cart-buttons">
            <button onclick="toggleCart()">Continue Shopping</button>
            <button onclick="goToCheckout()">Proceed to Checkout</button>
        </div>
    `;

    box.innerHTML = html;
}
function changeQuantity(productId, amount) {
    // 1. Find the item in the current user's cart
    let item = cart.find(i => i.id === productId);
    
    if (item) {
        item.quantity += amount;

        // 2. If quantity drops to 0, remove it entirely
        if (item.quantity <= 0) {
            removeFromCart(productId);
            return; 
        }
    }

    // 3. Save the updated cart to localStorage for this specific user
    let loggedUser = JSON.parse(localStorage.getItem("currentUser"));
    let userKey = "cart_" + loggedUser.email;
    localStorage.setItem(userKey, JSON.stringify(cart));
    
    // 4. Refresh the UI so the user sees the change instantly
    updateCartCount();
    updateCartDisplay();
}

function removeFromCart(productId) {
    // Filter out the item with the matching ID
    cart = cart.filter(item => item.id !== productId);
    
    // Save to the correct user-specific key
    let loggedUser = JSON.parse(localStorage.getItem("currentUser"));
    let userKey = "cart_" + loggedUser.email;
    
    localStorage.setItem(userKey, JSON.stringify(cart));
    
    // Update the UI
    updateCartCount();
    updateCartDisplay();
}

function goToCheckout() {
    saveCart();
    window.location.href = "checkout.html";
}

function toggleProfile(){

let popup = document.getElementById("profilePopup");

if(popup.style.display === "flex"){
popup.style.display = "none";
}else{

let user = JSON.parse(localStorage.getItem("currentUser"));

let fullName = (user.firstName || "") + " " + (user.lastName || "");
document.getElementById("profileName").innerText = fullName.trim() || "User";
document.getElementById("profileEmail").innerText = user.email;

popup.style.display = "flex";
}

}

function loadProfile() {
    let loggedUser = JSON.parse(localStorage.getItem("currentUser"));

    if (!loggedUser) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
    }

    // Show full name properly
    let fullName = (loggedUser.firstName || "") + " " + (loggedUser.lastName || "");

    document.getElementById("profileName").textContent = fullName.trim() || "User";
    document.getElementById("profileEmail").textContent = loggedUser.email || "user@example.com";

    // Change welcome message
    document.querySelector(".welcome").textContent = `Welcome, ${fullName || "User"}!`;
}

        userKey = "cart_" + loggedUser.email;

function logout(){
    // Remove only the current session
    localStorage.removeItem("currentUser");
    window.location.href = "index.html";
}
function closeProfile(){

<script>
const animals = [
    "🐱","🐟","🐠","🕊️","🐾","🐶",
];

function createAnimal() {
    let animal = document.createElement("div");
    animal.className = "animal";

    // Random emoji
    animal.innerText = animals[Math.floor(Math.random() * animals.length)];

    // Random vertical start
    let startY = Math.random() * window.innerHeight;
    animal.style.top = startY + "px";
    animal.style.left = "-50px";

    // Random size
    let size = Math.random() * 10 + 12;
    animal.style.fontSize = size + "px";

    document.body.appendChild(animal);

    // Delay (VERY IMPORTANT)
    setTimeout(() => {

        let endX = window.innerWidth + 100;
        let moveY = (Math.random() * 200) - 100;
        let duration = Math.random() * 10 + 15;

        animal.style.transition = `transform ${duration}s linear`;
        animal.style.transform = `translate(${endX}px, ${moveY}px)`;

        // Remove after animation
        setTimeout(() => {
            animal.remove();
        }, duration * 1000);

    }, 100);
}
</script>
